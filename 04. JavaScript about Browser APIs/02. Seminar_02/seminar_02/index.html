    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .quiz-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .question {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .question p {
            font-weight: bold;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        #results {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 5px;
            display: none;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>

    <!-- Задание № 4 -->
    <div class="quiz-container">
        <h1>Мини-опрос</h1>

        <div id="quiz-form">
            <!-- Вопрос 1 -->
            <div class="question" data-q="1">
                <p>1. Какой ваш любимый язык программирования?</p>
                <label><input type="radio" name="q1" value="JavaScript"> JavaScript</label>
                <label><input type="radio" name="q1" value="Python"> Python</label>
                <label><input type="radio" name="q1" value="C++"> C++</label>
            </div>

            <!-- Вопрос 2 -->
            <div class="question" data-q="2">
                <p>2. Какую среду разработки вы предпочитаете?</p>
                <label><input type="radio" name="q2" value="VS Code"> VS Code</label>
                <label><input type="radio" name="q2" value="WebStorm"> WebStorm</label>
                <label><input type="radio" name="q2" value="Vim/Emacs"> Vim/Emacs</label>
            </div>

            <div id="error-msg" class="error">Пожалуйста, ответьте на все вопросы!</div>
            <button onclick="finishQuiz()">Завершить опрос</button>
        </div>

        <div id="results">
            <h3>Ваши ответы:</h3>
            <div id="results-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
